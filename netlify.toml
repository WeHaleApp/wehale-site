[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Pin Node 20 so the build environment matches our local dev.
  # Astro 5 + Tailwind v4 work on 18.20.8+ but 20 is safer.
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# Astro hashes filenames in /_astro/ so 1-year immutable cache is safe.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap-index.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
